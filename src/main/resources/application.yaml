spring:
  application:
    name: DoubanMovieCrawler
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/douban_movie?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

crawler:
  min-delay: 2000
  max-delay: 5000
  max-retries: 3
  timeout: 20000
